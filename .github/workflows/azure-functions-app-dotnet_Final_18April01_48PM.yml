# This workflow will build a .NET Core project and deploy it to an Azure Functions App on Windows or Linux when a commit is pushed to your default branch.
#
# This workflow assumes you have already created the target Azure Functions app.
# For instructions see https://learn.microsoft.com/en-us/azure/azure-functions/create-first-function-vs-code-csharp?tabs=in-process
#
# To configure this workflow:
# 1. Set up the following secrets in your repository:
#   - AZURE_FUNCTIONAPP_PUBLISH_PROFILE
# 2. Change env variables for your configuration.
#
# For more information on:
#   - GitHub Actions for Azure: https://github.com/Azure/Actions
#   - Azure Functions Action: https://github.com/Azure/functions-action
#   - Publish Profile: https://github.com/Azure/functions-action#using-publish-profile-as-deployment-credential-recommended
#   - Azure Service Principal for RBAC: https://github.com/Azure/functions-action#using-azure-service-principal-for-rbac-as-deployment-credential
#
# For more samples to get started with GitHub Action workflows to deploy to Azure: https://github.com/Azure/actions-workflow-samples/tree/master/FunctionApp

# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: CI/CD with Four Environments

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.'   # Path to your Function App project
  DOTNET_VERSION: '8.0.x'

jobs:

  # --- Build Job ---
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Build with dotnet
        run: dotnet build --configuration Release
      - name: dotnet publish
        run: dotnet publish -c Release -o ./output
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: functionapp
          path: ./output

  # --- Test Job ---
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Run unit tests
        run: dotnet test --configuration Release

  # --- Deploy Staging ---
  deploy-staging:
    runs-on: ubuntu-latest
    needs: test
    environment: staging
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: functionapp
      - name: Azure Login
        uses: azure/login@v2
        with:
            creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Deploy to Azure Function App (Staging)
        uses: Azure/functions-action@v1
        with:
          app-name: 'FunctionAppForTestingCICD'
          slot-name: 'staging'
          package: './functionapp'

  # --- Deploy Production ---
  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production   # 👈 Reviewer gate here
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: functionapp
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Deploy to Azure Function App (Production)
        uses: Azure/functions-action@v1
        with:
          app-name: 'FunctionAppForTestingCICD'
          slot-name: 'production'
          package: './functionapp'
          
