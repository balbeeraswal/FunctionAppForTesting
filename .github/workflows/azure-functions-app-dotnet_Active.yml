name: CI/CD Azure Function App

on:
  push:
    branches: ["master"]

env:
  AZURE_FUNCTIONAPP_NAME_STAGING: 'FuncAppWithCICD'
  AZURE_FUNCTIONAPP_NAME_PROD: 'FuncAppWithCICD'
  DOTNET_VERSION: '8.0.x'

jobs:

# -------- Build --------
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build
        run: dotnet build --configuration Release --output ./output

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: functionapp
          path: ./output


# -------- Test --------
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Run Tests
        run: dotnet test


# -------- Staging --------
  staging:
    runs-on: ubuntu-latest
    needs: test
    environment: staging
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: functionapp

      - name: Deploy Staging
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME_PROD }}
          package: .
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}


# -------- Production --------
  production:
    runs-on: ubuntu-latest
    needs: staging
    environment: production   # 👈 reviewer here
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: functionapp

      - name: Deploy Production
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME_PROD }}
          package: .
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
